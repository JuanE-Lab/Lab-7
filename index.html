<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>The Bradbury Building</title>
    <meta name="description"
        content="Step into the Bradbury Building and discover a stunning mix of history, art, and architecture that feels straight out of a movie.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700..900&family=Playfair+Display&display=swap"
        rel="stylesheet">

    <style>
        header h1 {
            font-family: "Montserrat", sans-serif;
            font-optical-sizing: auto;
            font-style: normal; 
        }

        main p {
            font-family: "Playfair Display", serif;
            font-optical-sizing: auto;
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>

<body class="bg-light">
    
    <div class="container bg-white rounded-3 shadow my-4 my-md-5 p-4 p-md-5">
        
        <header class="mb-4 mb-md-5">
            <h1 class="display-2 fw-bold text-dark mb-0">
                The Bradbury Building
            </h1>
        </header>

        <main class="row align-items-center">
            
            <div class="col-12 col-md-5 mb-4 mb-md-0">
                <img src="img/bb.jpg" alt="The Bradbury Building" class="img-fluid rounded">
            </div>
            
            <div class="col-12 col-md-7 ps-md-5">
                <p class="fs-4 text-dark mb-0">
                    Step into the Bradbury Building and discover a stunning mix of history, art, and architecture that feels
                    straight out of a movie—just a short trip from Cal State LA.
                </p>
            </div>
            
        </main>
    </div>

</body>

</html>
